openapi: 3.1.0

info:
  title: Sentiment Analysis API
  description: |
    A simple API that classifies a given text into sentiment categories
    (e.g., positive, negative, neutral).

    This API supports two different models:
    - **XLM-RoBERTa** for short texts (default)
    - **Longformer** for long texts

  version: 0.0.0
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12
  contact:
    name: AIT / Taranis-AI
    email: benjamin.akhras@ait.ac.at

servers:
  - url: http://localhost:5500
    description: Local development server
  - url: http://localhost:8000
    description: Docker container server

paths:
  /sentiment:
    post:
      summary: Analyze sentiment of a single text
      description: |
        Receives a single text string and returns the predicted sentiment
        and optional confidence scores depending on the model implementation.
      operationId: analyzeSentiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SentimentRequest'
            examples:
              example:
                summary: Simple sentiment request
                value:
                  text: "I really like this product, it works great!"

      responses:
        '200':
          description: Sentiment classification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentimentResponse'
              examples:
                positive:
                  summary: Example positive result
                  value:
                    label: "positive"
                    score: 0.952

        '400':
          description: Bad request - missing or invalid text field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Missing required field: text"

        '422':
          description: Validation error - e.g., empty text string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Text must not be empty"

        '500':
          description: Internal model or inference error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Sentiment model inference failed"

  /health:
    get:
      summary: Health check status
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                example:
                  status: "ok"

        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    SentimentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Input text to classify
          minLength: 1
          example: "This is a great idea!"

    SentimentResponse:
      type: object
      description: Sentiment analysis results
      properties:
        label:
          type: string
          description: Predicted sentiment label
          example: "positive"
        score:
          type: number
          description: Confidence score for the predicted label
          example: 0.72

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        details:
          type: string
          nullable: true

tags:
  - name: Sentiment Analysis
    description: Sentiment classifier endpoint
  - name: System
    description: Health endpoint
